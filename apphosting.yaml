# apphosting.yaml
runConfig:
  cpu: 1
  memoryMiB: 512
  minInstances: 0
  maxInstances: 10
  concurrency: 80

# Environment variables — real Firebase project credentials
env:
  - variable: NEXT_PUBLIC_FIREBASE_API_KEY
    secret: NEXT_PUBLIC_FIREBASE_API_KEY
  - variable: NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN
    value: "electricvisiontrack.firebaseapp.com"
  - variable: NEXT_PUBLIC_FIREBASE_PROJECT_ID
    value: "electricvisiontrack"
  - variable: NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET
    value: "electricvisiontrack.firebasestorage.app"
  - variable: NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID
    value: "553511097361"
  - variable: NEXT_PUBLIC_FIREBASE_APP_ID
    value: "1:553511097361:web:a9f30003b8f9274dcf8db0"
